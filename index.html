<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>focus · pomodoro</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div class="timer" id="timer">50:00</div>

      <div class="presets-row">
        <div class="presets">
          <button class="preset-btn active" data-work="50" data-rest="10">
            50/10
          </button>
          <button class="preset-btn" data-work="60" data-rest="10">
            60/10
          </button>
          <button class="preset-btn" data-work="90" data-rest="15">
            90/15
          </button>
          <button class="preset-btn" data-work="120" data-rest="30">
            120/30
          </button>
        </div>
        <button class="reset-btn" id="resetBtn">↻</button>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
